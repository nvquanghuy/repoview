            /* ── Collapsible sections ────────────────────────────────── */
            function getCollapseStorageKey(filePath) {
                return 'collapsedSections:' + filePath;
            }

            function loadCollapseState(filePath) {
                try {
                    var data = localStorage.getItem(getCollapseStorageKey(filePath));
                    return data ? JSON.parse(data) : [];
                } catch (e) {
                    return [];
                }
            }

            function saveCollapseState(filePath, collapsedIds) {
                try {
                    if (collapsedIds.length === 0) {
                        localStorage.removeItem(getCollapseStorageKey(filePath));
                    } else {
                        localStorage.setItem(getCollapseStorageKey(filePath), JSON.stringify(collapsedIds));
                    }
                } catch (e) {
                    // Ignore storage errors
                }
            }

            function getCollapsedIds(container) {
                var ids = [];
                container.querySelectorAll('.heading-section.collapsed').forEach(function(section) {
                    var heading = section.querySelector('h1, h2, h3, h4, h5, h6');
                    if (heading && heading.id) {
                        ids.push(heading.id);
                    }
                });
                return ids;
            }

            function toggleSection(section, filePath) {
                section.classList.toggle('collapsed');
                var container = section.closest('.markdown-body');
                if (container) {
                    saveCollapseState(filePath, getCollapsedIds(container));
                }
            }

            function expandSectionForElement(element) {
                var parent = element.closest('.heading-section');
                while (parent) {
                    parent.classList.remove('collapsed');
                    parent = parent.parentElement ? parent.parentElement.closest('.heading-section') : null;
                }
            }

            function collapseAllSections(container, filePath) {
                container.querySelectorAll('.heading-section').forEach(function(section) {
                    section.classList.add('collapsed');
                });
                saveCollapseState(filePath, getCollapsedIds(container));
            }

            function expandAllSections(container, filePath) {
                container.querySelectorAll('.heading-section.collapsed').forEach(function(section) {
                    section.classList.remove('collapsed');
                });
                saveCollapseState(filePath, []);
            }

            function renderMermaidDiagrams(container) {
                var codeBlocks = container.querySelectorAll('code.language-mermaid');
                codeBlocks.forEach(function(code) {
                    var pre = code.parentElement;
                    var diagram = document.createElement('div');
                    diagram.className = 'mermaid';
                    diagram.textContent = code.textContent;
                    pre.parentNode.replaceChild(diagram, pre);
                });
                if (codeBlocks.length > 0) {
                    mermaid.run();
                }
            }

            function wrapCollapsibleSections(container, filePath) {
                var headings = Array.from(container.querySelectorAll('h1, h2, h3, h4, h5, h6'));
                if (headings.length === 0) return;

                var collapsedIds = loadCollapseState(filePath);

                // Process headings in reverse order to handle nesting correctly
                for (var i = headings.length - 1; i >= 0; i--) {
                    var heading = headings[i];
                    var level = parseInt(heading.tagName.charAt(1));

                    // Collect content until next heading of same or higher level
                    var contentNodes = [];
                    var sibling = heading.nextSibling;
                    while (sibling) {
                        if (sibling.nodeType === 1) {
                            // Check if it's a heading of same or higher level
                            var siblingTag = sibling.tagName;
                            if (/^H[1-6]$/.test(siblingTag)) {
                                var siblingLevel = parseInt(siblingTag.charAt(1));
                                if (siblingLevel <= level) break;
                            }
                            // Check if it's a heading-section with same or higher level
                            if (sibling.classList && sibling.classList.contains('heading-section')) {
                                var sectionHeading = sibling.querySelector('h1, h2, h3, h4, h5, h6');
                                if (sectionHeading) {
                                    var sectionLevel = parseInt(sectionHeading.tagName.charAt(1));
                                    if (sectionLevel <= level) break;
                                }
                            }
                        }
                        contentNodes.push(sibling);
                        sibling = sibling.nextSibling;
                    }

                    // Create section wrapper
                    var section = document.createElement('div');
                    section.className = 'heading-section';

                    // Restore collapsed state
                    if (collapsedIds.indexOf(heading.id) !== -1) {
                        section.classList.add('collapsed');
                    }

                    // Insert section before heading
                    heading.parentNode.insertBefore(section, heading);

                    // Move heading into section
                    section.appendChild(heading);

                    // Add toggle button to heading
                    var toggle = document.createElement('button');
                    toggle.className = 'heading-toggle';
                    toggle.innerHTML = SVG.collapseToggle;
                    toggle.setAttribute('aria-label', 'Toggle section');
                    toggle.onclick = function(sec) {
                        return function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            toggleSection(sec, filePath);
                        };
                    }(section);
                    heading.insertBefore(toggle, heading.firstChild);

                    // Create content wrapper if there's content
                    if (contentNodes.length > 0) {
                        var contentWrapper = document.createElement('div');
                        contentWrapper.className = 'heading-section-content';
                        var inner = document.createElement('div');
                        inner.className = 'heading-section-inner';
                        contentWrapper.appendChild(inner);
                        section.appendChild(contentWrapper);

                        // Move content nodes
                        contentNodes.forEach(function(node) {
                            inner.appendChild(node);
                        });
                    }
                }
            }

            /* ── Outline sidebar ──────────────────────────────────────── */
            var outlineBtn = null;

            function buildOutline(container) {
                var sidebar = document.getElementById("outline-sidebar");
                var content = sidebar.querySelector(".outline-content");
                var headings = container.querySelectorAll(
                    "h1, h2, h3, h4, h5, h6",
                );

                if (headings.length < 2) {
                    content.innerHTML =
                        '<div class="outline-empty">No headings found</div>';
                    return false;
                }

                var html = '<ul class="outline-list">';
                headings.forEach(function (h) {
                    var level = parseInt(h.tagName.charAt(1));
                    var id =
                        h.id ||
                        h.textContent.toLowerCase().replace(/[^\w]+/g, "-");
                    if (!h.id) h.id = id;
                    var text = h.textContent;
                    html +=
                        '<li><a class="outline-link outline-h' +
                        level +
                        '" href="#' +
                        escAttr(id) +
                        '" onclick="onOutlineLinkClick(event)">' +
                        esc(text) +
                        "</a></li>";
                });
                html += "</ul>";
                content.innerHTML = html;
                return true;
            }

            function onOutlineLinkClick(e) {
                e.preventDefault();
                var id = e.target.getAttribute("href").slice(1);
                var target = document.getElementById(id);
                if (target) {
                    expandSectionForElement(target);
                    // Save state after expanding
                    var mdBody = document.querySelector('.markdown-body');
                    if (mdBody && currentFilePath) {
                        saveCollapseState(currentFilePath, getCollapsedIds(mdBody));
                    }
                    history.pushState(null, "", "#" + id);
                    target.scrollIntoView({ behavior: "smooth" });
                    // Close outline on mobile after clicking a link
                    if (window.innerWidth <= 768) {
                        hideOutline();
                        localStorage.setItem("outlineOpen", "0");
                    }
                }
            }

            function toggleOutline() {
                var sidebar = document.getElementById("outline-sidebar");
                var isOpen = sidebar.classList.toggle("open");
                if (outlineBtn) {
                    outlineBtn.classList.toggle("active", isOpen);
                }
                localStorage.setItem("outlineOpen", isOpen ? "1" : "0");
            }

            function showOutline() {
                var sidebar = document.getElementById("outline-sidebar");
                sidebar.classList.add("open");
                if (outlineBtn) outlineBtn.classList.add("active");
            }

            function hideOutline() {
                var sidebar = document.getElementById("outline-sidebar");
                sidebar.classList.remove("open");
                if (outlineBtn) outlineBtn.classList.remove("active");
            }

            function createOutlineButton() {
                var btn = document.createElement("button");
                btn.className = "outline-btn";
                btn.innerHTML =
                    '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M7.75 2.5a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5Zm0 5a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5Zm0 5a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5h-6.5ZM2.5 2.75a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5a.75.75 0 0 1-.75-.75Zm.75 4.25a.75.75 0 0 0 0 1.5h.5a.75.75 0 0 0 0-1.5h-.5Zm0 5a.75.75 0 0 0 0 1.5h.5a.75.75 0 0 0 0-1.5h-.5Z"/></svg>Outline';
                btn.onclick = toggleOutline;
                return btn;
            }

            function getViewParam() {
                var params = new URLSearchParams(location.search);
                return params.get("view");
            }

            function setViewParam(view) {
                var params = new URLSearchParams(location.search);
                if (view) {
                    params.set("view", view);
                } else {
                    params.delete("view");
                }
                var qs = params.toString();
                var url = location.pathname + (qs ? "?" + qs : "");
                history.replaceState(null, "", url);
            }

            // ── PDF Viewer ─────────────────────────────────────────────
            function renderPDF(path, data) {
                var area = document.getElementById("content-area");
                var rawURL = "/api/raw?path=" + encodeURIComponent(path);
                area.innerHTML = '<div class="pdf-viewer"><embed src="' + escAttr(rawURL) + '" type="application/pdf"></div>';
            }

            async function loadFile(path, skipPush) {
                closeSidebar();
                // Unwatch old file
                if (currentFilePath) wsUnwatch(currentFilePath);

                currentFilePath = path;
                currentPath = path.includes("/")
                    ? path.substring(0, path.lastIndexOf("/"))
                    : "";
                if (!skipPush) pushURL(path);
                updateBreadcrumb(path);

                // Hide file header bar initially (will show after loading)
                hideFileHeaderBar();

                // Expand parent dirs in sidebar
                var parts = path.split("/");
                var accumulated = "";
                for (var i = 0; i < parts.length - 1; i++) {
                    accumulated = accumulated
                        ? accumulated + "/" + parts[i]
                        : parts[i];
                    if (!expandedDirs.has(accumulated)) {
                        expandedDirs.add(accumulated);
                        await fetchTree(accumulated);
                        wsWatch(accumulated);
                    }
                }

                var result = await apiFetch(
                    "/api/file?path=" + encodeURIComponent(path),
                );
                if (!result.ok) {
                    var area = document.getElementById("content-area");
                    if (result.isNetworkError) {
                        area.innerHTML =
                            '<div class="welcome"><h2>Unable to load file</h2><p>The server may have stopped. Click Retry above to reconnect.</p></div>';
                    } else if (result.status === 404) {
                        area.innerHTML =
                            '<div class="welcome"><h2>File not found</h2><p>The file <code>' +
                            esc(path) +
                            "</code> does not exist or was removed.</p></div>";
                    } else {
                        area.innerHTML =
                            '<div class="welcome"><h2>Error loading file</h2><p>' +
                            esc(result.error || "Unknown error") +
                            "</p></div>";
                    }
                    return;
                }
                var data = result.data;

                var area = document.getElementById("content-area");

                // Handle PDF files
                if (data.isPDF) {
                    if (getViewParam()) setViewParam(null);
                    renderPDF(path, data);

                    var sizeStr = formatFileSize(data.size);
                    var metaHTML = "<span>" + esc(sizeStr) + '</span><span class="sep">·</span><span>PDF</span>';
                    showFileHeaderBar(null, metaHTML);

                    wsWatch(path);
                    refreshTree();
                    var filename = path.split("/").pop();
                    document.title = filename + " - RepoView";
                    return;
                }

                if (data.isBinary) {
                    // Strip ?view param for binary files
                    if (getViewParam()) setViewParam(null);
                    var rawURL = "/api/raw?path=" + encodeURIComponent(path);
                    var sizeStr = formatFileSize(data.size);
                    var mime = data.mimeType || "application/octet-stream";
                    var html = "";
                    if (mime.startsWith("image/")) {
                        html =
                            '<div class="binary-preview"><img src="' +
                            escAttr(rawURL) +
                            '" alt="' +
                            escAttr(data.name) +
                            '"></div>';
                        html += '<div class="binary-info">';
                        html +=
                            '<div class="binary-meta"><span>' +
                            esc(sizeStr) +
                            "</span><span>" +
                            esc(mime) +
                            "</span></div>";
                        html +=
                            '<a class="binary-download" href="' +
                            escAttr(rawURL) +
                            '" download="' +
                            escAttr(data.name) +
                            '">Download</a>';
                        html += "</div>";
                    } else if (mime.startsWith("video/")) {
                        html =
                            '<div class="binary-preview"><video controls src="' +
                            escAttr(rawURL) +
                            '"></video></div>';
                        html += '<div class="binary-info">';
                        html +=
                            '<div class="binary-meta"><span>' +
                            esc(sizeStr) +
                            "</span><span>" +
                            esc(mime) +
                            "</span></div>";
                        html +=
                            '<a class="binary-download" href="' +
                            escAttr(rawURL) +
                            '" download="' +
                            escAttr(data.name) +
                            '">Download</a>';
                        html += "</div>";
                    } else if (mime.startsWith("audio/")) {
                        html =
                            '<div class="binary-preview"><audio controls src="' +
                            escAttr(rawURL) +
                            '"></audio></div>';
                        html += '<div class="binary-info">';
                        html +=
                            '<div class="binary-meta"><span>' +
                            esc(sizeStr) +
                            "</span><span>" +
                            esc(mime) +
                            "</span></div>";
                        html +=
                            '<a class="binary-download" href="' +
                            escAttr(rawURL) +
                            '" download="' +
                            escAttr(data.name) +
                            '">Download</a>';
                        html += "</div>";
                    } else {
                        html = '<div class="binary-info">';
                        html += '<div class="binary-icon">&#128462;</div>';
                        html +=
                            '<div class="binary-filename">' +
                            esc(data.name) +
                            "</div>";
                        html +=
                            '<div class="binary-meta"><span>' +
                            esc(sizeStr) +
                            "</span><span>" +
                            esc(mime) +
                            "</span></div>";
                        html += "<p>Binary file not displayed</p>";
                        html +=
                            '<a class="binary-download" href="' +
                            escAttr(rawURL) +
                            '" download="' +
                            escAttr(data.name) +
                            '">Download</a>';
                        html += "</div>";
                    }
                    area.innerHTML = html;

                    // Show file header bar with metadata for binary files
                    var metaHTML =
                        "<span>" +
                        esc(sizeStr) +
                        '</span><span class="sep">·</span><span>' +
                        esc(mime) +
                        "</span>";
                    showFileHeaderBar(null, metaHTML);

                    wsWatch(path);
                    refreshTree();
                    var filename = path.split("/").pop();
                    document.title = filename + " - RepoView";
                    return;
                }
                if (data.isMarkdown || data.isSVG) {
                    var previewHTML, codeHTML;
                    if (data.isMarkdown) {
                        previewHTML =
                            '<div class="markdown-body">' +
                            data.content +
                            "</div>";
                    } else {
                        previewHTML =
                            '<div class="svg-preview">' +
                            data.rawSVG +
                            "</div>";
                    }
                    codeHTML =
                        '<div class="source-code">' +
                        data.rawContent +
                        "</div>";
                    var wantCode = getViewParam() === "code";
                    var hasOutline = false;

                    function renderMarkdownPreview() {
                        area.innerHTML = previewHTML;
                        if (data.isMarkdown) {
                            bindAnchorLinks(area);
                            var mdBody = area.querySelector(".markdown-body");
                            if (mdBody) {
                                addHeadingAnchors(mdBody);
                                rewriteMarkdownImages(mdBody, path);
                                resolveWikiLinks(mdBody, path);
                                wrapCollapsibleSections(mdBody, currentFilePath);
                                renderMermaidDiagrams(mdBody);
                                hasOutline = buildOutline(mdBody);
                                if (
                                    hasOutline &&
                                    localStorage.getItem("outlineOpen") === "1"
                                ) {
                                    showOutline();
                                }
                                // Scroll to hash if present
                                if (location.hash) {
                                    var target = document.getElementById(
                                        location.hash.slice(1),
                                    );
                                    if (target) {
                                        expandSectionForElement(target);
                                        saveCollapseState(currentFilePath, getCollapsedIds(mdBody));
                                        setTimeout(function () {
                                            target.scrollIntoView();
                                        }, 50);
                                    }
                                }
                            }
                        }
                    }

                    if (wantCode) {
                        area.innerHTML = codeHTML;
                        hideOutline();
                    } else {
                        renderMarkdownPreview();
                    }

                    // Create toggle
                    var toggle = document.createElement("span");
                    toggle.className = "view-toggle";
                    var btnPreview = document.createElement("button");
                    btnPreview.textContent = "Preview";
                    btnPreview.className = wantCode ? "" : "active";
                    var btnCode = document.createElement("button");
                    btnCode.textContent = "Code";
                    btnCode.className = wantCode ? "active" : "";
                    toggle.appendChild(btnPreview);
                    toggle.appendChild(btnCode);

                    // Show file header bar with toggle and outline button for markdown
                    showFileHeaderBar(toggle, null);
                    if (data.isMarkdown && !wantCode) {
                        outlineBtn = createOutlineButton();
                        var actions = document.querySelector(
                            "#file-header-bar .file-header-actions",
                        );
                        // Insert outline button before edit button
                        actions.insertBefore(outlineBtn, actions.firstChild);
                        if (localStorage.getItem("outlineOpen") === "1") {
                            outlineBtn.classList.add("active");
                        }
                    }

                    btnPreview.onclick = function () {
                        renderMarkdownPreview();
                        btnPreview.className = "active";
                        btnCode.className = "";
                        setViewParam(null);
                        // Show outline button
                        if (data.isMarkdown) {
                            var actions = document.querySelector(
                                "#file-header-bar .file-header-actions",
                            );
                            // Remove old outline button if present
                            var oldOutline =
                                actions.querySelector(".outline-btn");
                            if (oldOutline) oldOutline.remove();
                            outlineBtn = createOutlineButton();
                            actions.insertBefore(
                                outlineBtn,
                                actions.firstChild,
                            );
                            if (
                                hasOutline &&
                                localStorage.getItem("outlineOpen") === "1"
                            ) {
                                outlineBtn.classList.add("active");
                                showOutline();
                            }
                        }
                    };
                    btnCode.onclick = function () {
                        area.innerHTML = codeHTML;
                        btnCode.className = "active";
                        btnPreview.className = "";
                        setViewParam("code");
                        hideOutline();
                        // Hide outline button (keep edit button)
                        var actions = document.querySelector(
                            "#file-header-bar .file-header-actions",
                        );
                        var oldOutline = actions.querySelector(".outline-btn");
                        if (oldOutline) oldOutline.remove();
                        outlineBtn = null;
                    };
                } else if (data.isCSV) {
                    var tableHTML =
                        '<div class="csv-table">' + data.content + "</div>";
                    var recordsHTML = null;
                    var wantRecords = getViewParam() === "records";

                    area.innerHTML = tableHTML;

                    // Create toggle
                    var toggle = document.createElement("span");
                    toggle.className = "view-toggle";
                    var btnTable = document.createElement("button");
                    btnTable.textContent = "Table";
                    btnTable.className = wantRecords ? "" : "active";
                    var btnRecords = document.createElement("button");
                    btnRecords.textContent = "Records";
                    btnRecords.className = wantRecords ? "active" : "";
                    toggle.appendChild(btnTable);
                    toggle.appendChild(btnRecords);

                    // Show file header bar with toggle
                    showFileHeaderBar(toggle, null);

                    function showRecords() {
                        if (!recordsHTML && data.rawCSV) {
                            var rows = parseCSVAll(data.rawCSV);
                            if (rows.length > 0) {
                                var headers = rows[0];
                                var dataRows = rows.slice(1);
                                recordsHTML = renderCSVRecords(
                                    headers,
                                    dataRows,
                                );
                            } else {
                                recordsHTML =
                                    '<div class="csv-records"><p>No records found</p></div>';
                            }
                        }
                        area.innerHTML =
                            recordsHTML ||
                            '<div class="csv-records"><p>No records found</p></div>';
                        var recordIdx = getRecordParam();
                        if (recordIdx) {
                            setTimeout(function () {
                                scrollToRecord(parseInt(recordIdx, 10));
                            }, 50);
                        }
                    }

                    function showTable() {
                        area.innerHTML = tableHTML;
                        btnTable.className = "active";
                        btnRecords.className = "";
                        bindRowLinkClicks();
                    }

                    function switchToRecordsView(recordIndex) {
                        showRecords();
                        btnRecords.className = "active";
                        btnTable.className = "";
                        setViewParam("records");
                        setRecordParam(recordIndex);
                        setTimeout(function () {
                            scrollToRecord(recordIndex);
                        }, 50);
                    }

                    function bindRowLinkClicks() {
                        area.querySelectorAll(".csv-record-link-btn").forEach(
                            function (btn) {
                                btn.addEventListener("click", function (e) {
                                    e.stopPropagation();
                                    var rowIndex = parseInt(
                                        btn.dataset.row,
                                        10,
                                    );
                                    switchToRecordsView(rowIndex);
                                });
                            },
                        );
                    }

                    btnTable.onclick = function () {
                        showTable();
                        setViewParam(null);
                        setRecordParam(null);
                    };
                    btnRecords.onclick = function () {
                        showRecords();
                        btnRecords.className = "active";
                        btnTable.className = "";
                        setViewParam("records");
                    };

                    if (wantRecords) {
                        showRecords();
                    } else {
                        bindRowLinkClicks();
                    }
                } else {
                    // Strip ?view param for non-toggle files
                    if (getViewParam()) setViewParam(null);
                    area.innerHTML =
                        '<div class="source-code">' + data.content + "</div>";
                    // Show file header bar without toggle for plain files
                    showFileHeaderBar(null, null);
                }

                // Update page title
                var filename = path.split("/").pop();
                document.title = filename + " - RepoView";

                wsWatch(path);
                refreshTree();
            }

            /* ── Breadcrumb ───────────────────────────────────────────── */
            function updateBreadcrumb(path) {
                var bc = document.getElementById("breadcrumb-path");
                if (!path) {
                    bc.innerHTML = "";
                    return;
                }
                var parts = path.split("/");
                var html = "";
                var accumulated = "";
                for (var i = 0; i < parts.length; i++) {
                    accumulated = accumulated
                        ? accumulated + "/" + parts[i]
                        : parts[i];
                    var isLast = i === parts.length - 1;
                    html += '<span class="sep">/</span>';
                    if (isLast) {
                        html +=
                            '<span class="crumb current">' +
                            esc(parts[i]) +
                            "</span>";
                    } else {
                        html +=
                            '<span class="crumb" data-nav="' +
                            escAttr(accumulated) +
                            '">' +
                            esc(parts[i]) +
                            "</span>";
                    }
                }
                bc.innerHTML = html;
                // Bind click handlers
                bc.querySelectorAll(".crumb[data-nav]").forEach(function (el) {
                    el.onclick = function () {
                        navigateTo(el.dataset.nav);
                    };
                });
            }

            /* ── Mobile Sidebar ───────────────────────────────────────── */
            function toggleSidebar() {
                var sidebar = document.getElementById("sidebar");
                var overlay = document.getElementById("sidebar-overlay");
                var isOpen = sidebar.classList.toggle("open");
                overlay.classList.toggle("open", isOpen);
                document.body.style.overflow = isOpen ? "hidden" : "";
            }

            function closeSidebar() {
                var sidebar = document.getElementById("sidebar");
                var overlay = document.getElementById("sidebar-overlay");
                sidebar.classList.remove("open");
                overlay.classList.remove("open");
                document.body.style.overflow = "";
            }

            /* ── Fuzzy Search ─────────────────────────────────────────── */
            async function openSearch() {
                document.getElementById("search-overlay").classList.add("open");
                var input = document.getElementById("search-input");
                input.value = "";
                input.focus();
                if (!allFiles) {
                    var result = await apiFetch("/api/files");
                    if (!result.ok) {
                        if (!result.isNetworkError) {
                            // API error - just close search, don't show connection banner
                            closeSearch();
                        }
                        return;
                    }
                    allFiles = result.data;
                }
                renderSearchResults(allFiles.slice(0, 50), false);
                searchIdx = 0;
                updateSearchSelection();
            }

            function closeSearch() {
                document
                    .getElementById("search-overlay")
                    .classList.remove("open");
            }

            function onSearchInput() {
                var q = document.getElementById("search-input").value.trim();
                if (!allFiles) return;
                if (!q) {
                    renderSearchResults(allFiles.slice(0, 50), false);
                } else {
                    var results = fuzzysort(q, allFiles, 50);
                    renderSearchResults(results, true);
                }
                searchIdx = 0;
                updateSearchSelection();
            }

            function onSearchKey(e) {
                var results = document.querySelectorAll(".search-result");
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    searchIdx = Math.min(searchIdx + 1, results.length - 1);
                    updateSearchSelection();
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    searchIdx = Math.max(searchIdx - 1, 0);
                    updateSearchSelection();
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    if (results[searchIdx]) {
                        results[searchIdx].click();
                    }
                } else if (e.key === "Escape") {
                    closeSearch();
                }
            }

            function updateSearchSelection() {
                var items = document.querySelectorAll(".search-result");
                items.forEach(function (el, i) {
                    el.classList.toggle("selected", i === searchIdx);
                });
                if (items[searchIdx])
                    items[searchIdx].scrollIntoView({ block: "nearest" });
            }

            function renderSearchResults(items, isHighlighted) {
                var container = document.getElementById("search-results");
                if (!items || items.length === 0) {
                    container.innerHTML =
                        '<div id="search-empty">No files found</div>';
                    return;
                }
                var html = "";
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    var display, raw;
                    if (isHighlighted) {
                        display = item.highlighted;
                        raw = item.target;
                    } else {
                        display = esc(item);
                        raw = item;
                    }
                    html +=
                        '<div class="search-result" data-path="' +
                        escAttr(raw) +
                        '">' +
                        '<span class="sr-icon">' +
                        getFileIcon(raw) +
                        "</span>" +
                        '<span class="sr-path">' +
                        display +
                        "</span></div>";
                }
                container.innerHTML = html;
                container
                    .querySelectorAll(".search-result")
                    .forEach(function (el) {
                        el.onclick = function () {
                            closeSearch();
                            loadFile(el.dataset.path);
                        };
                    });
            }

            /* ── Minimal fuzzysort implementation ─────────────────────── */
            function fuzzyMatchTerm(term, tl, target, startFrom) {
                var qi = 0,
                    score = 0,
                    consecutive = 0,
                    lastIdx = -1;
                var indices = [];
                for (
                    var ti = startFrom;
                    ti < tl.length && qi < term.length;
                    ti++
                ) {
                    if (tl[ti] === term[qi]) {
                        indices.push(ti);
                        consecutive = ti === lastIdx + 1 ? consecutive + 1 : 1;
                        score += consecutive + (ti === 0 ? 2 : 0);
                        if (
                            ti > 0 &&
                            (target[ti - 1] === "/" ||
                                target[ti - 1] === "." ||
                                target[ti - 1] === "-" ||
                                target[ti - 1] === "_")
                        )
                            score += 2;
                        lastIdx = ti;
                        qi++;
                    }
                }
                if (qi < term.length) return null;
                return { score: score, indices: indices };
            }

            function fuzzysort(query, targets, limit) {
                var terms = query
                    .toLowerCase()
                    .split(/\s+/)
                    .filter(function (t) {
                        return t.length > 0;
                    });
                if (terms.length === 0) return [];
                var scored = [];
                for (var t = 0; t < targets.length; t++) {
                    var target = targets[t];
                    var tl = target.toLowerCase();
                    var totalScore = 0,
                        allIndices = [],
                        matched = true;
                    for (var ti = 0; ti < terms.length; ti++) {
                        var m = fuzzyMatchTerm(terms[ti], tl, target, 0);
                        if (!m) {
                            matched = false;
                            break;
                        }
                        totalScore += m.score;
                        for (var k = 0; k < m.indices.length; k++)
                            allIndices.push(m.indices[k]);
                    }
                    if (matched) {
                        totalScore -= target.length * 0.1;
                        allIndices.sort(function (a, b) {
                            return a - b;
                        });
                        scored.push({
                            target: target,
                            score: totalScore,
                            indices: allIndices,
                        });
                    }
                }
                scored.sort(function (a, b) {
                    return b.score - a.score;
                });
                var results = scored.slice(0, limit);
                return results.map(function (r) {
                    var highlighted = "";
                    var last = 0;
                    var seen = {};
                    for (var j = 0; j < r.indices.length; j++) {
                        var idx = r.indices[j];
                        if (seen[idx]) continue;
                        seen[idx] = true;
                        if (idx < last) continue;
                        highlighted +=
                            esc(r.target.substring(last, idx)) +
                            "<mark>" +
                            esc(r.target[idx]) +
                            "</mark>";
                        last = idx + 1;
                    }
                    highlighted += esc(r.target.substring(last));
                    return { target: r.target, highlighted: highlighted };
                });
            }

            /* ── WebSocket ────────────────────────────────────────────── */
            var wsRetryCount = 0;
            function connectWS() {
                var proto = location.protocol === "https:" ? "wss:" : "ws:";
                ws = new WebSocket(proto + "//" + location.host + "/ws");
                ws.onopen = function () {
                    wsRetryCount = 0;
                    hideConnectionError();
                    for (var p of watchedPaths) {
                        ws.send(JSON.stringify({ action: "watch", path: p }));
                    }
                };
                ws.onmessage = function (e) {
                    try {
                        var msg = JSON.parse(e.data);
                        if (msg.path) {
                            refreshTree();
                            if (msg.path === currentFilePath) {
                                loadFile(currentFilePath);
                            }
                        }
                    } catch (err) {}
                };
                ws.onclose = function () {
                    wsRetryCount++;
                    if (wsRetryCount >= 2) {
                        showConnectionError();
                    }
                    setTimeout(connectWS, 2000);
                };
                ws.onerror = function () {
                    ws.close();
                };
            }

            function wsWatch(path) {
                watchedPaths.add(path);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ action: "watch", path: path }));
                }
            }

            function wsUnwatch(path) {
                watchedPaths.delete(path);
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ action: "unwatch", path: path }));
                }
            }

            /* ── CSV helpers ──────────────────────────────────────────── */
            function parseCSV(text) {
                var lines = [];
                var current = "";
                var inQuotes = false;
                for (var i = 0; i < text.length; i++) {
                    var ch = text[i];
                    if (ch === '"') {
                        if (inQuotes && text[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (ch === "," && !inQuotes) {
                        lines.push(current);
                        current = "";
                    } else if (
                        (ch === "\n" ||
                            (ch === "\r" && text[i + 1] === "\n")) &&
                        !inQuotes
                    ) {
                        if (ch === "\r") i++;
                        lines.push(current);
                        current = "";
                        if (lines.length > 0) {
                            var row = lines;
                            lines = [];
                            return { row: row, rest: text.slice(i + 1) };
                        }
                    } else {
                        current += ch;
                    }
                }
                if (current || lines.length > 0) {
                    lines.push(current);
                }
                return { row: lines.length > 0 ? lines : null, rest: "" };
            }

            function parseCSVAll(text) {
                var rows = [];
                var remaining = text;
                while (remaining) {
                    var result = parseCSV(remaining);
                    if (result.row && result.row.length > 0) {
                        rows.push(result.row);
                    }
                    if (result.rest === remaining) break;
                    remaining = result.rest;
                }
                return rows;
            }

            function renderCSVRecords(headers, rows) {
                var html = '<div class="csv-records">';
                for (var i = 0; i < rows.length; i++) {
                    var row = rows[i];
                    html +=
                        '<div class="csv-record-card" id="record-' +
                        (i + 1) +
                        '">';
                    html +=
                        '<div class="record-header">Record ' +
                        (i + 1) +
                        "</div>";
                    html += '<div class="record-fields">';
                    for (var j = 0; j < headers.length; j++) {
                        var value = j < row.length ? row[j] : "";
                        html += '<div class="field-row">';
                        html +=
                            '<div class="field-label">' +
                            esc(headers[j]) +
                            "</div>";
                        html +=
                            '<div class="field-value">' + esc(value) + "</div>";
                        html += "</div>";
                    }
                    html += "</div></div>";
                }
                html += "</div>";
                return html;
            }

            function scrollToRecord(index) {
                var el = document.getElementById("record-" + index);
                if (el) {
                    el.scrollIntoView({ behavior: "smooth", block: "start" });
                }
            }

            function getRecordParam() {
                var params = new URLSearchParams(location.search);
                return params.get("r");
            }

            function setRecordParam(index) {
                var params = new URLSearchParams(location.search);
                if (index) {
                    params.set("r", index);
                } else {
                    params.delete("r");
                }
                var qs = params.toString();
                var url = location.pathname + (qs ? "?" + qs : "");
                history.replaceState(null, "", url);
            }

            /* ── Helpers ──────────────────────────────────────────────── */
            function formatFileSize(bytes) {
                if (bytes === 0) return "0 B";
                var units = ["B", "KB", "MB", "GB"];
                var i = Math.floor(Math.log(bytes) / Math.log(1024));
                if (i >= units.length) i = units.length - 1;
                var val = bytes / Math.pow(1024, i);
                return (i === 0 ? val : val.toFixed(1)) + " " + units[i];
            }
            function esc(s) {
                var d = document.createElement("div");
                d.textContent = s;
                return d.innerHTML;
            }
            function escAttr(s) {
                return s
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }
            function formatDate(ms) {
                if (!ms) return "";
                var d = new Date(ms);
                var mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                return mon[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
            }

            /* ── Keyboard shortcut ────────────────────────────────────── */
            document.addEventListener("keydown", function (e) {
                if (
                    e.target.tagName === "INPUT" ||
                    e.target.tagName === "TEXTAREA"
                )
                    return;
                if (e.key === "t") {
                    e.preventDefault();
                    openSearch();
                }
                // Alt+C: Collapse all sections
                if (e.altKey && e.key === "c") {
                    e.preventDefault();
                    var mdBody = document.querySelector('.markdown-body');
                    if (mdBody && currentFilePath) {
                        collapseAllSections(mdBody, currentFilePath);
                    }
                }
                // Alt+E: Expand all sections
                if (e.altKey && e.key === "e") {
                    e.preventDefault();
                    var mdBody = document.querySelector('.markdown-body');
                    if (mdBody && currentFilePath) {
                        expandAllSections(mdBody, currentFilePath);
                    }
                }
            });

            /* ── Resize handle ────────────────────────────────────────── */
            (function initResize() {
                var handle = document.getElementById("resize-handle");
                var sidebar = document.getElementById("sidebar");
                var startX, startW;
                handle.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    startX = e.clientX;
                    startW = sidebar.offsetWidth;
                    handle.classList.add("active");
                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onUp);
                });
                function onMove(e) {
                    var w = startW + (e.clientX - startX);
                    sidebar.style.width =
                        Math.max(140, Math.min(w, window.innerWidth * 0.5)) +
                        "px";
                }
                function onUp() {
                    handle.classList.remove("active");
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                }
            })();

            /* ── Outline resize handle ───────────────────────────────────── */
            (function initOutlineResize() {
                var handle = document.getElementById("outline-resize-handle");
                var sidebar = document.getElementById("outline-sidebar");
                var startX, startW;
                handle.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    startX = e.clientX;
                    startW = sidebar.offsetWidth;
                    handle.classList.add("active");
                    sidebar.style.transition = "none";
                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onUp);
                });
                function onMove(e) {
                    // Dragging left increases width (opposite of left sidebar)
                    var w = startW - (e.clientX - startX);
                    sidebar.style.width =
                        Math.max(180, Math.min(w, window.innerWidth * 0.5)) +
                        "px";
                }
                function onUp() {
                    handle.classList.remove("active");
                    sidebar.style.transition = "";
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onUp);
                }
            })();

            /* ── URL routing ──────────────────────────────────────────── */
            function encodePath(path) {
                return path.split("/").map(encodeURIComponent).join("/");
            }

            function pushURL(path) {
                var url = path ? "/" + encodePath(path) : "/";
                if (location.pathname !== url) {
                    history.pushState(null, "", url);
                }
            }

            function isFilePath(path) {
                var lastSegment = path.split("/").pop();
                return lastSegment.indexOf(".") !== -1;
            }

            function navigateFromURL(skipPush) {
                var raw = location.pathname.replace(/^\//, "");
                if (!raw) return false;
                var path = decodeURIComponent(raw);
                if (isFilePath(path)) {
                    loadFile(path, skipPush);
                } else {
                    navigateTo(path, skipPush);
                }
                return true;
            }

            window.addEventListener("popstate", function () {
                if (!navigateFromURL(true)) {
                    // Back to root
                    navigateTo("", true);
                    refreshTree();
                }
            });

            /* ── Init ─────────────────────────────────────────────────── */
            (async function init() {
                await Promise.all([refreshTree(), loadEditors()]);
                connectWS();
                if (!navigateFromURL(true)) {
                    await navigateTo("", true);
                }
            })();
        </script>
    </body>
</html>
