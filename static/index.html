<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RepoView</title>
        <style>
            /* ── Reset & Base ─────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                    Helvetica, Arial, sans-serif;
                font-size: 14px;
                line-height: 1.5;
                color: #1f2328;
                background: #fff;
            }
            a {
                color: #0969da;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            /* ── Layout ───────────────────────────────────────────────── */
            #app {
                display: flex;
                height: 100vh;
            }
            #sidebar {
                width: 250px;
                min-width: 140px;
                max-width: 50vw;
                background: #f6f8fa;
                border-right: 1px solid #d0d7de;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                overflow: hidden;
                position: relative;
            }
            #sidebar-header {
                padding: 12px 16px;
                border-bottom: 1px solid #d0d7de;
                font-weight: 600;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
            }
            #sidebar-header .repo-icon {
                color: #656d76;
            }
            #tree-container {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
            }
            #resize-handle {
                position: absolute;
                top: 0;
                right: -3px;
                width: 6px;
                height: 100%;
                cursor: col-resize;
                z-index: 10;
            }
            #resize-handle:hover,
            #resize-handle.active {
                background: #0969da40;
            }

            #main {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-width: 0;
            }
            #content-wrapper {
                flex: 1;
                display: flex;
                overflow: hidden;
            }
            #breadcrumb-bar {
                position: sticky;
                top: 0;
                z-index: 5;
                padding: 8px 24px;
                border-bottom: 1px solid #d0d7de;
                background: #fff;
                display: flex;
                align-items: center;
                gap: 4px;
                font-size: 14px;
                flex-shrink: 0;
                flex-wrap: wrap;
            }
            #breadcrumb-bar .sep {
                color: #656d76;
                margin: 0 2px;
            }
            #breadcrumb-bar .crumb {
                cursor: pointer;
                color: #0969da;
            }
            #breadcrumb-bar .crumb:hover {
                text-decoration: underline;
            }
            #breadcrumb-bar .crumb.current {
                color: #1f2328;
                font-weight: 600;
                cursor: default;
            }
            #breadcrumb-bar .crumb.current:hover {
                text-decoration: none;
            }
            #go-to-file-btn {
                margin: 8px 12px 4px;
                padding: 5px 12px;
                font-size: 12px;
                width: calc(100% - 24px);
                border: 1px solid #d0d7de;
                border-radius: 6px;
                background: #fff;
                color: #656d76;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                flex-shrink: 0;
            }
            #go-to-file-btn:hover {
                background: #eaeef2;
            }
            #go-to-file-btn kbd {
                font-family: inherit;
                font-size: 11px;
                padding: 0 4px;
                border: 1px solid #d0d7de;
                border-radius: 3px;
                background: #fff;
            }
            #content-area {
                flex: 1;
                overflow-y: auto;
                padding: 24px 24px 24px 48px;
                min-width: 0;
            }

            /* ── Welcome ──────────────────────────────────────────────── */
            .welcome {
                color: #656d76;
                text-align: center;
                margin-top: 120px;
            }
            .welcome h2 {
                font-size: 20px;
                margin-bottom: 8px;
                color: #1f2328;
            }

            /* ── Dir listing ──────────────────────────────────────────── */
            .dir-listing {
                border: 1px solid #d0d7de;
                border-radius: 6px;
                overflow: hidden;
            }
            .dir-listing-row {
                display: flex;
                align-items: center;
                padding: 8px 16px;
                gap: 8px;
                border-bottom: 1px solid #d0d7de;
                cursor: pointer;
                font-size: 14px;
            }
            .dir-listing-row:last-child {
                border-bottom: none;
            }
            .dir-listing-row:hover {
                background: #f6f8fa;
            }
            .dir-listing-row .icon {
                flex-shrink: 0;
                color: #54aeff;
                width: 16px;
            }
            .dir-listing-row .icon.folder {
                color: #54aeff;
            }
            .dir-listing-row .icon.file {
                color: #656d76;
            }
            .dir-listing-row .name {
                flex: 1;
            }
            .dir-listing-row .size,
            .dir-listing-row .modified {
                color: #656d76;
                font-size: 12px;
                flex-shrink: 0;
            }
            .dir-listing-row .size {
                width: 70px;
                text-align: right;
            }
            .dir-listing-row .modified {
                width: 140px;
                text-align: right;
            }

            /* ── Tree ─────────────────────────────────────────────────── */
            .tree-item {
                display: flex;
                align-items: center;
                padding: 4px 8px;
                cursor: pointer;
                gap: 4px;
                white-space: nowrap;
                border-radius: 6px;
                margin: 1px 4px;
                font-size: 14px;
            }
            .tree-item:hover {
                background: #eaeef2;
            }
            .tree-item.active {
                background: #ddf4ff;
            }
            .tree-item .icon {
                flex-shrink: 0;
                width: 16px;
                height: 16px;
            }
            .tree-item .caret {
                flex-shrink: 0;
                width: 16px;
                height: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: transform 0.12s;
            }
            .tree-item .caret.open {
                transform: rotate(90deg);
            }
            .tree-item .caret.hidden {
                visibility: hidden;
            }
            .tree-item .label {
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .tree-children {
                padding-left: 12px;
            }
            .tree-children.collapsed {
                display: none;
            }

            /* ── Connection Banner ────────────────────────────────────── */
            #connection-banner {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 200;
                padding: 10px 16px;
                background: #ffebe9;
                border-bottom: 1px solid #ffcecb;
                color: #cf222e;
                font-size: 14px;
                text-align: center;
                animation: slideDown 0.2s ease-out;
            }
            #connection-banner.show {
                display: block;
            }
            #connection-banner .banner-icon {
                margin-right: 8px;
            }
            #connection-banner .retry-btn {
                margin-left: 12px;
                padding: 4px 12px;
                font-size: 12px;
                background: #cf222e;
                color: #fff;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            #connection-banner .retry-btn:hover {
                background: #a40e26;
            }
            @keyframes slideDown {
                from {
                    transform: translateY(-100%);
                }
                to {
                    transform: translateY(0);
                }
            }

            /* ── Fuzzy Search Modal ───────────────────────────────────── */
            #search-overlay {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 100;
                background: #00000040;
                justify-content: center;
                padding-top: 80px;
            }
            #search-overlay.open {
                display: flex;
            }
            #search-box {
                width: 540px;
                max-width: 90vw;
                background: #fff;
                border: 1px solid #d0d7de;
                border-radius: 12px;
                box-shadow: 0 8px 24px #00000020;
                overflow: hidden;
                align-self: flex-start;
            }
            #search-input {
                width: 100%;
                padding: 12px 16px;
                font-size: 16px;
                border: none;
                outline: none;
                border-bottom: 1px solid #d0d7de;
                font-family: inherit;
            }
            #search-results {
                max-height: 400px;
                overflow-y: auto;
            }
            .search-result {
                padding: 8px 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
            }
            .search-result:hover,
            .search-result.selected {
                background: #ddf4ff;
            }
            .search-result .sr-icon {
                flex-shrink: 0;
                color: #656d76;
                width: 16px;
            }
            .search-result .sr-path {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .search-result mark {
                background: none;
                font-weight: 700;
                color: #1f2328;
            }
            #search-empty {
                padding: 16px;
                color: #656d76;
                text-align: center;
                font-size: 13px;
            }

            /* ── Markdown body (GitHub-style) ─────────────────────────── */
            .markdown-body {
                font-size: 16px;
                line-height: 1.6;
                word-wrap: break-word;
                color: #1f2328;
            }
            .markdown-body h1,
            .markdown-body h2,
            .markdown-body h3,
            .markdown-body h4,
            .markdown-body h5,
            .markdown-body h6 {
                margin-top: 24px;
                margin-bottom: 16px;
                font-weight: 600;
                line-height: 1.25;
                position: relative;
            }
            .markdown-body .heading-anchor {
                color: #656d76;
                opacity: 0;
                transition: opacity 0.1s;
                text-decoration: none;
                margin-left: 8px;
            }
            .markdown-body h1:hover .heading-anchor,
            .markdown-body h2:hover .heading-anchor,
            .markdown-body h3:hover .heading-anchor,
            .markdown-body h4:hover .heading-anchor,
            .markdown-body h5:hover .heading-anchor,
            .markdown-body h6:hover .heading-anchor,
            .markdown-body .heading-anchor:focus {
                opacity: 1;
            }
            .markdown-body .heading-anchor:hover {
                color: #0969da;
            }
            .markdown-body h1 {
                font-size: 2em;
                padding-bottom: 0.3em;
                border-bottom: 1px solid #d0d7de;
            }
            .markdown-body h2 {
                font-size: 1.5em;
                padding-bottom: 0.3em;
                border-bottom: 1px solid #d0d7de;
            }
            .markdown-body h3 {
                font-size: 1.25em;
            }
            .markdown-body h4 {
                font-size: 1em;
            }
            .markdown-body h5 {
                font-size: 0.875em;
            }
            .markdown-body h6 {
                font-size: 0.85em;
                color: #656d76;
            }
            .markdown-body p {
                margin-top: 0;
                margin-bottom: 16px;
            }
            .markdown-body ul,
            .markdown-body ol {
                padding-left: 2em;
                margin-bottom: 16px;
            }
            .markdown-body li + li {
                margin-top: 0.25em;
            }
            .markdown-body blockquote {
                margin: 0 0 16px;
                padding: 0 1em;
                color: #656d76;
                border-left: 0.25em solid #d0d7de;
            }
            .markdown-body code {
                padding: 0.2em 0.4em;
                font-size: 85%;
                background: #eff1f3;
                border-radius: 6px;
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
                    monospace;
            }
            .markdown-body pre {
                margin-bottom: 16px;
                padding: 16px;
                overflow: auto;
                font-size: 85%;
                line-height: 1.45;
                background: #f6f8fa;
                border-radius: 6px;
                border: 1px solid #d0d7de;
            }
            .markdown-body pre code {
                padding: 0;
                background: transparent;
                border-radius: 0;
                font-size: 100%;
            }
            .markdown-body .mermaid {
                text-align: center;
                margin: 16px 0;
                padding: 16px;
                background: #f6f8fa;
                border-radius: 6px;
                border: 1px solid #d0d7de;
                overflow-x: auto;
            }
            .wiki-link {
                text-decoration: none;
                border-bottom: 1px dashed #0969da;
                cursor: pointer;
            }
            .wiki-link:hover {
                border-bottom-style: solid;
            }
            .wiki-link-broken {
                color: #cf222e;
                border-bottom-color: #cf222e;
            }
            .wiki-link-broken::after {
                content: ' [?]';
                font-size: 0.8em;
            }
            .markdown-body table {
                border-collapse: collapse;
                border-spacing: 0;
                margin-bottom: 16px;
                width: auto;
                overflow: auto;
                display: block;
            }
            .markdown-body table th,
            .markdown-body table td {
                padding: 6px 13px;
                border: 1px solid #d0d7de;
            }
            .markdown-body table th {
                font-weight: 600;
                background: #f6f8fa;
            }
            .markdown-body table tr:nth-child(2n) {
                background: #f6f8fa;
            }
            .markdown-body img {
                max-width: 100%;
            }
            .markdown-body hr {
                height: 0.25em;
                padding: 0;
                margin: 24px 0;
                background: #d0d7de;
                border: 0;
            }
            .markdown-body a {
                color: #0969da;
            }
            .markdown-body .task-list-item {
                list-style: none;
            }
            .markdown-body .task-list-item input {
                margin-right: 0.5em;
            }

            /* ── Collapsible heading sections ────────────────────────── */
            .markdown-body .heading-section { position: relative; }
            .markdown-body .heading-section-content {
                display: grid;
                grid-template-rows: 1fr;
                transition: grid-template-rows 0.2s ease-out;
            }
            .markdown-body .heading-section.collapsed > .heading-section-content {
                grid-template-rows: 0fr;
            }
            .markdown-body .heading-section-content > .heading-section-inner {
                min-height: 0;
                overflow: hidden;
                margin-left: -24px;
                padding-left: 24px;
            }
            .markdown-body .heading-toggle {
                position: absolute;
                left: -24px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.15s, transform 0.15s;
                background: none;
                border: none;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .markdown-body h1:hover .heading-toggle,
            .markdown-body h2:hover .heading-toggle,
            .markdown-body h3:hover .heading-toggle,
            .markdown-body h4:hover .heading-toggle,
            .markdown-body h5:hover .heading-toggle,
            .markdown-body h6:hover .heading-toggle,
            .markdown-body .heading-toggle:focus { opacity: 1; }
            .markdown-body .heading-section.collapsed > h1 .heading-toggle,
            .markdown-body .heading-section.collapsed > h2 .heading-toggle,
            .markdown-body .heading-section.collapsed > h3 .heading-toggle,
            .markdown-body .heading-section.collapsed > h4 .heading-toggle,
            .markdown-body .heading-section.collapsed > h5 .heading-toggle,
            .markdown-body .heading-section.collapsed > h6 .heading-toggle {
                transform: translateY(-50%) rotate(-90deg);
                opacity: 0.6;
            }

            /* ── Outline sidebar ──────────────────────────────────────── */
            #outline-sidebar {
                position: relative;
                width: 0;
                min-width: 0;
                overflow: hidden;
                background: #fff;
                border-left: 1px solid transparent;
                transition:
                    width 0.15s ease,
                    min-width 0.15s ease,
                    border-color 0.15s ease;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
            }
            #outline-sidebar.open {
                width: 280px;
                min-width: 180px;
                border-left-color: #d0d7de;
            }
            #outline-resize-handle {
                position: absolute;
                top: 45px;
                left: 0;
                width: 6px;
                bottom: 0;
                cursor: col-resize;
                z-index: 10;
            }
            #outline-resize-handle:hover,
            #outline-resize-handle.active {
                background: #0969da40;
            }
            .outline-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                border-bottom: 1px solid #d0d7de;
            }
            .outline-header-title {
                font-weight: 600;
                font-size: 14px;
                color: #1f2328;
            }
            .outline-close {
                background: none;
                border: none;
                padding: 4px;
                cursor: pointer;
                color: #656d76;
                border-radius: 4px;
                display: flex;
            }
            .outline-close:hover {
                background: #eaeef2;
                color: #1f2328;
            }
            .outline-content {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0;
            }
            .outline-list {
                list-style: none;
                margin: 0;
                padding: 0;
            }
            .outline-link {
                display: block;
                padding: 6px 16px;
                color: #1f2328;
                text-decoration: none;
                font-size: 14px;
                line-height: 1.5;
            }
            .outline-link:hover {
                background: #f6f8fa;
                color: #0969da;
            }
            .outline-h1 {
                font-weight: 600;
            }
            .outline-h2 {
                padding-left: 32px;
            }
            .outline-h3 {
                padding-left: 48px;
                color: #656d76;
            }
            .outline-h4 {
                padding-left: 64px;
                color: #656d76;
            }
            .outline-h5 {
                padding-left: 80px;
                color: #656d76;
            }
            .outline-h6 {
                padding-left: 96px;
                color: #656d76;
            }
            .outline-empty {
                padding: 16px;
                color: #656d76;
                font-size: 14px;
            }

            /* Outline toggle button */
            .outline-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                font-weight: 500;
                color: #1f2328;
                background: #f6f8fa;
                border: 1px solid #d0d7de;
                border-radius: 6px;
                cursor: pointer;
            }
            .outline-btn:hover {
                background: #eaeef2;
            }
            .outline-btn.active {
                background: #ddf4ff;
                border-color: #54aeff;
                color: #0969da;
            }
            .outline-btn svg {
                color: #656d76;
            }
            .outline-btn.active svg {
                color: #0969da;
            }

            /* ── Source code (non-markdown) ───────────────────────────── */
            .source-code {
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
                    monospace;
                font-size: 13px;
                line-height: 1.5;
                border: 1px solid #d0d7de;
                border-radius: 6px;
                overflow: auto;
            }
            .source-code pre {
                margin: 0;
                padding: 16px;
            }

            /* ── CSV table ────────────────────────────────────────────── */
            .csv-table {
                border: 1px solid #d0d7de;
                border-radius: 6px;
                overflow: auto;
            }
            .csv-table table {
                border-collapse: collapse;
                width: 100%;
            }
            .csv-table th,
            .csv-table td {
                padding: 6px 13px;
                border: 1px solid #d0d7de;
                font-size: 13px;
            }
            .csv-table th {
                background: #f6f8fa;
                font-weight: 600;
                position: sticky;
                top: 0;
            }

            /* ── CSV records view ─────────────────────────────────────── */
            .csv-records {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .csv-record-card {
                border: 1px solid #d0d7de;
                border-radius: 6px;
                overflow: hidden;
            }
            .csv-record-card .record-header {
                background: #f6f8fa;
                padding: 8px 13px;
                font-weight: 600;
                border-bottom: 1px solid #d0d7de;
            }
            .csv-record-card .field-row {
                display: flex;
                border-top: 1px solid #d0d7de;
            }
            .csv-record-card .field-row:first-child {
                border-top: none;
            }
            .csv-record-card .field-label {
                width: 30%;
                min-width: 120px;
                padding: 6px 13px;
                background: #f6f8fa;
                font-weight: 500;
                font-size: 13px;
                border-right: 1px solid #d0d7de;
            }
            .csv-record-card .field-value {
                flex: 1;
                padding: 6px 13px;
                font-size: 13px;
                word-break: break-word;
            }

            /* ── CSV row-to-record link ──────────────────────────────── */
            .csv-row-link-header {
                width: 40px;
            }
            .csv-row-link {
                width: 40px;
                text-align: center;
            }
            .csv-record-link-btn {
                background: none;
                border: none;
                cursor: pointer;
                color: #0969da;
                font-size: 14px;
                padding: 4px 8px;
                border-radius: 4px;
            }
            .csv-record-link-btn:hover {
                background: #f6f8fa;
            }

            /* ── File header bar (GitHub-style) ──────────────────────── */
            #file-header-bar {
                display: none;
                padding: 8px 16px;
                background: #f6f8fa;
                border-bottom: 1px solid #d0d7de;
                align-items: center;
                gap: 16px;
                flex-shrink: 0;
            }
            #file-header-bar.visible {
                display: flex;
            }
            #file-header-bar .file-header-left {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            #file-header-bar .file-header-meta {
                color: #656d76;
                font-size: 12px;
                display: flex;
                align-items: center;
                gap: 4px;
            }
            #file-header-bar .file-header-meta .sep {
                margin: 0 4px;
            }
            #file-header-bar .file-header-actions {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            /* ── View toggle ─────────────────────────────────────────── */
            .view-toggle {
                display: inline-flex;
                border: 1px solid #d0d7de;
                border-radius: 6px;
                overflow: hidden;
                font-size: 12px;
                flex-shrink: 0;
            }
            .view-toggle button {
                padding: 4px 12px;
                border: none;
                background: #f6f8fa;
                color: #656d76;
                cursor: pointer;
                font-family: inherit;
                font-size: 12px;
            }
            .view-toggle button:not(:last-child) {
                border-right: 1px solid #d0d7de;
            }

        <script>

            };

            function getFileIcon(name) {
                const ext = name.split('.').pop().toLowerCase();
                if (ext === 'md' || ext === 'mdx' || ext === 'markdown') return SVG.fileMarkdown;
                if (ext === 'pdf') return SVG.filePdf;
                if (ext === 'json') return SVG.fileJson;
                if (ext === 'yml' || ext === 'yaml') return SVG.fileYaml;
                return SVG.file;
            }

            /* ── State ────────────────────────────────────────────────── */
            let currentPath = "";
            let currentFilePath = "";
            let expandedDirs = new Set();
            let treeCache = {};
            let allFiles = null;
            let wikiLinkIndex = null;
            let searchIdx = 0;
            let ws = null;
            let watchedPaths = new Set();
            let connectionLost = false;
            var availableEditors = [];
            var preferredEditor = localStorage.getItem("preferredEditor");

            /* ── Connection Status ───────────────────────────────────── */
            function showConnectionError(message) {
                connectionLost = true;
                var banner = document.getElementById("connection-banner");
                banner.querySelector(".banner-message").textContent =
                    message || "Connection lost. The server may have stopped.";
                banner.classList.add("show");
            }

            function hideConnectionError() {
                connectionLost = false;
                document
                    .getElementById("connection-banner")
                    .classList.remove("show");
            }

            async function retryConnection() {
                try {
                    var res = await fetch("/api/tree?path=.");
                    if (res.ok) {
                        hideConnectionError();
                        treeCache = {};
                        allFiles = null;
                        wikiLinkIndex = null;
                        await refreshTree();
                        connectWS();
                    }
                } catch (e) {
                    // Still disconnected
                }
            }

            /* ── API helpers ──────────────────────────────────────────── */
            // Returns {ok, data, status, error} - distinguishes network vs HTTP errors
            async function apiFetch(url) {
                try {
                    var res = await fetch(url);
                    hideConnectionError();
                    if (!res.ok) {
                        var errorText = await res.text().catch(function () {
                            return res.statusText;
                        });
                        return {
                            ok: false,
                            status: res.status,
                            error: errorText,
                        };
                    }
                    var data = await res.json();
                    return { ok: true, data: data };
                } catch (e) {
                    // Network error - server unreachable
                    showConnectionError();
                    return {
                        ok: false,
                        status: 0,
                        error: "network",
                        isNetworkError: true,
                    };
                }
            }

            /* ── Editor functions ─────────────────────────────────────── */

            async function loadEditors() {
                var result = await apiFetch("/api/editors");
                if (result.ok) {
                    availableEditors = result.data || [];
                }
            }

            function createEditButton() {
                var container = document.createElement("div");
                container.className = "edit-dropdown";

                var btn = document.createElement("button");
                btn.className = "edit-dropdown-btn";
                btn.innerHTML =
                    '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61Zm.176 4.823L9.75 4.81l-6.286 6.287a.253.253 0 0 0-.064.108l-.558 1.953 1.953-.558a.253.253 0 0 0 .108-.064Zm1.238-3.763a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354Z"/></svg>Edit';

                var menu = document.createElement("div");
                menu.className = "edit-dropdown-menu";

                btn.onclick = function (e) {
                    e.stopPropagation();
                    // Close any other open dropdowns
                    document
                        .querySelectorAll(".edit-dropdown-menu.open")
                        .forEach(function (m) {
                            if (m !== menu) m.classList.remove("open");
                        });
                    menu.classList.toggle("open");
                    if (menu.classList.contains("open")) {
                        populateEditMenu(menu);
                    }
                };

                container.appendChild(btn);
                container.appendChild(menu);

                // Close on outside click
                document.addEventListener("click", function (e) {
                    if (!container.contains(e.target)) {
                        menu.classList.remove("open");
                    }
                });

                return container;
            }

            function populateEditMenu(menu) {
                menu.innerHTML = "";

                // Filter editors into installed and not installed
                var installed = availableEditors.filter(function (e) {
                    return e.available;
                });
                var notInstalled = availableEditors.filter(function (e) {
                    return !e.available;
                });

                if (installed.length === 0) {
                    menu.innerHTML =
                        '<div class="edit-dropdown-empty">No editors found</div>';
                } else {
                    // Add header
                    var header = document.createElement("div");
                    header.className = "edit-dropdown-header";
                    header.textContent = "Installed editors";
                    menu.appendChild(header);

                    // Sort: preferred first, then alphabetically
                    var sorted = installed.slice().sort(function (a, b) {
                        if (a.id === preferredEditor) return -1;
                        if (b.id === preferredEditor) return 1;
                        return a.name.localeCompare(b.name);
                    });

                    sorted.forEach(function (editor) {
                        var item = document.createElement("button");
                        item.className = "edit-dropdown-item";
                        if (editor.id === preferredEditor) {
                            item.classList.add("preferred");
                        }
                        var icon = editorIcons[editor.id] || "";
                        item.innerHTML =
                            icon + "<span>" + esc(editor.name) + "</span>";
                        item.onclick = function (e) {
                            e.stopPropagation();
                            menu.classList.remove("open");
                            openInEditor(editor.id);
                        };
                        menu.appendChild(item);
                    });
                }

                // Show footer with uninstalled editors as links
                if (notInstalled.length > 0) {
                    notInstalled.sort(function (a, b) {
                        return a.name.localeCompare(b.name);
                    });
                    var links = notInstalled.map(function (e) {
                        return (
                            '<a href="' +
                            escAttr(e.setupUrl) +
                            '" target="_blank">' +
                            esc(e.name) +
                            "</a>"
                        );
                    });
                    var footer = document.createElement("div");
                    footer.className = "edit-dropdown-footer";
                    footer.innerHTML =
                        "Also supports: " +
                        links.join(", ") +
                        ".<br>Requires shell command installation.";
                    menu.appendChild(footer);
                }
            }

            async function openInEditor(editorId) {
                // Save preference
                preferredEditor = editorId;
                localStorage.setItem("preferredEditor", editorId);

                var res = await fetch(
                    "/api/open?path=" +
                        encodeURIComponent(currentFilePath) +
                        "&editor=" +
                        encodeURIComponent(editorId),
                    {
                        method: "POST",
                    },
                );
                var data = await res.json();
                if (!data.success) {
                    showEditorError(data.error, data.setupUrl);
                }
            }

            /* ── Tree ─────────────────────────────────────────────────── */
            async function fetchTree(path) {
                if (treeCache[path]) return treeCache[path];
                var result = await apiFetch(
                    "/api/tree?path=" + encodeURIComponent(path),
                );
                if (!result.ok) {
                    if (result.isNetworkError) throw new Error("Network error");
                    // HTTP error (e.g., directory not found) - return empty array, don't break tree
                    return [];
                }
                treeCache[path] = result.data;
                return result.data;
            }

            function renderTree(items, container, depth) {
                items.sort((a, b) => {
                    if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
                    return a.name.localeCompare(b.name);
                });
                for (const item of items) {
                    const row = document.createElement("div");
                    // Highlight active file OR active directory (only when viewing directory, not a file inside it)
                    const isActive = item.isDir
                        ? item.path === currentPath && !currentFilePath
                        : item.path === currentFilePath;
                    row.className = "tree-item" + (isActive ? " active" : "");
                    row.style.paddingLeft = 8 + depth * 12 + "px";
                    row.dataset.path = item.path;
                    row.dataset.isDir = item.isDir;

                    const isOpen = expandedDirs.has(item.path);
                    if (item.isDir) {
                        row.innerHTML =
                            `<span class="caret ${isOpen ? "open" : ""}">${SVG.caret}</span>` +
                            `<span class="icon">${isOpen ? SVG.folderOpen : SVG.folderClosed}</span>` +
                            `<span class="label">${esc(item.name)}</span>`;
                        row.onclick = (e) => {
                            e.stopPropagation();
                            // Caret click or already-selected folder: toggle expand/collapse
                            if (
                                e.target.closest(".caret") ||
                                item.path === currentPath
                            ) {
                                toggleDir(item.path);
                            } else {
                                navigateTo(item.path);
                            }
                        };
                    } else {
                        row.innerHTML =
                            `<span class="caret hidden">${SVG.caret}</span>` +
                            `<span class="icon">${getFileIcon(item.name)}</span>` +
                            `<span class="label">${esc(item.name)}</span>`;
                        row.onclick = (e) => {
                            e.stopPropagation();
                            loadFile(item.path);
                        };
                    }
                    container.appendChild(row);

                    if (item.isDir) {
                        const childContainer = document.createElement("div");
                        childContainer.className =
                            "tree-children" + (isOpen ? "" : " collapsed");
                        childContainer.id =
                            "tree-children-" +
                            item.path.replace(/[^a-zA-Z0-9]/g, "_");
                        container.appendChild(childContainer);
                        if (isOpen && treeCache[item.path]) {
                            renderTree(
                                treeCache[item.path],
                                childContainer,
                                depth + 1,
                            );
                        }
                    }
                }
            }

            async function toggleDir(path) {
                if (expandedDirs.has(path)) {
                    expandedDirs.delete(path);
                    wsUnwatch(path);
                } else {
                    expandedDirs.add(path);
                    await fetchTree(path);
                    wsWatch(path);
                }
                refreshTree();
            }

            async function refreshTree() {
                // Fetch root and all expanded directories in parallel
                var pathsToFetch = [""];
                for (var dir of expandedDirs) {
                    pathsToFetch.push(dir);
                }
                await Promise.all(
                    pathsToFetch.map(function (p) {
                        delete treeCache[p]; // Force re-fetch
                        return fetchTree(p);
                    }),
                );

                var root = treeCache[""];
                var container = document.getElementById("tree-container");
                container.innerHTML = "";
                renderTree(root, container, 0);
                var active = container.querySelector(".tree-item.active");
                if (active) {
                    var cr = container.getBoundingClientRect();
                    var ar = active.getBoundingClientRect();
                    if (ar.top < cr.top || ar.bottom > cr.bottom) {
                        active.scrollIntoView({ block: "center" });
                    }
                }
            }

            /* ── Dir listing in main area ─────────────────────────────── */
            function renderDirListing(items, dirPath) {
                items.sort(function (a, b) {
                    if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
                    return a.name.localeCompare(b.name);
                });
                var html = '<div class="dir-listing">';
                if (dirPath) {
                    var parent = dirPath.includes("/")
                        ? dirPath.substring(0, dirPath.lastIndexOf("/"))
                        : "";
                    html +=
                        '<div class="dir-listing-row" data-path="' +
                        escAttr(parent) +
                        '" data-isdir="true">' +
                        '<span class="icon folder">' +
                        SVG.folderClosed +
                        "</span>" +
                        '<span class="name">..</span>' +
                        '<span class="size"></span>' +
                        '<span class="modified"></span></div>';
                }
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    var icon = item.isDir
                        ? '<span class="icon folder">' +
                          SVG.folderClosed +
                          "</span>"
                        : '<span class="icon file">' + getFileIcon(item.name) + "</span>";
                    var sizeStr = item.isDir ? "" : formatFileSize(item.size);
                    var modStr = formatDate(item.modTime);
                    html +=
                        '<div class="dir-listing-row" data-path="' +
                        escAttr(item.path) +
                        '" data-isdir="' +
                        item.isDir +
                        '">' +
                        icon +
                        '<span class="name">' +
                        esc(item.name) +
                        '</span>' +
                        '<span class="size">' + sizeStr + '</span>' +
                        '<span class="modified">' + modStr + '</span></div>';
                }
                html += "</div>";
                return html;
            }

            /* ── Navigate to directory ────────────────────────────────── */
            async function navigateTo(path, skipPush) {
                closeSidebar();
                currentPath = path;
                currentFilePath = "";
                // Hide file header bar when navigating to a directory
                hideFileHeaderBar();
                if (getViewParam()) setViewParam(null);
                if (!skipPush) pushURL(path);
                updateBreadcrumb(path);
                var items = await fetchTree(path);

                // expand in sidebar
                if (path) {
                    expandedDirs.add(path);
                    wsWatch(path);
                }
                refreshTree();

                // Update page title
                if (path) {
                    var dirname = path.split("/").pop();
                    document.title = dirname + " - RepoView";
                } else {
                    document.title = "RepoView";
                }

                document.getElementById("content-area").innerHTML =
                    renderDirListing(items, path);
                bindDirListingClicks();

                // Check for README.md in this directory and render it below the listing
                var readme = items.find(function (item) {
                    return (
                        !item.isDir && item.name.toLowerCase() === "readme.md"
                    );
                });
                if (readme) {
                    fetch("/api/file?path=" + encodeURIComponent(readme.path))
                        .then(function (res) {
                            return res.json();
                        })
                        .then(function (data) {
                            if (data.content) {
                                var container = document.createElement("div");
                                container.className = "readme-container";
                                container.innerHTML =
                                    '<div class="readme-header">' +
                                    esc(readme.name) +
                                    "</div>" +
                                    '<div class="readme-body markdown-body">' +
                                    data.content +
                                    "</div>";
                                document
                                    .getElementById("content-area")
                                    .appendChild(container);
                                var mdBody =
                                    container.querySelector(".markdown-body");
                                if (mdBody) {
                                    addHeadingAnchors(mdBody);
                                    rewriteMarkdownImages(mdBody, readme.path);
                                }
                                bindAnchorLinks(container);
                            }
                        });
                }
            }

            function bindDirListingClicks() {
                var rows = document.querySelectorAll(".dir-listing-row");
                rows.forEach(function (row) {
                    row.onclick = function () {
                        var p = row.dataset.path;
                        if (row.dataset.isdir === "true") {
                            navigateTo(p);
                        } else {
                            loadFile(p);
                        }
                    };
                });
            }

            /* ── File header bar ──────────────────────────────────────── */
            function showFileHeaderBar(toggle, meta) {
                var bar = document.getElementById("file-header-bar");
                var left = bar.querySelector(".file-header-left");
                var metaEl = bar.querySelector(".file-header-meta");
                var actions = bar.querySelector(".file-header-actions");

                left.innerHTML = "";
                metaEl.innerHTML = "";
                actions.innerHTML = "";

                if (toggle) {
                    left.appendChild(toggle);
                }
                if (meta) {
                    metaEl.innerHTML = meta;
                }

                // Add edit button if installed editors are available
                var hasInstalledEditors = availableEditors.some(function (e) {
                    return e.available;
                });
                if (hasInstalledEditors && currentFilePath) {
                    var editBtn = createEditButton();
                    actions.appendChild(editBtn);
                }

                bar.classList.add("visible");
            }

            function hideFileHeaderBar() {
                var bar = document.getElementById("file-header-bar");
                bar.classList.remove("visible");
                bar.querySelector(".file-header-left").innerHTML = "";
                bar.querySelector(".file-header-meta").innerHTML = "";
                bar.querySelector(".file-header-actions").innerHTML = "";
                hideOutline();
                outlineBtn = null;
            }

            /* ── File loading ─────────────────────────────────────────── */
            function rewriteMarkdownImages(container, filePath) {
                var dir = filePath.split("/").slice(0, -1).join("/");
                container.querySelectorAll("img").forEach(function (img) {
                    var src = img.getAttribute("src");
                    if (!src) return;
                    // Skip absolute URLs (http://, https://, data:, /api/)
                    if (/^https?:\/\/|^data:|^\/api\//.test(src)) return;
                    var resolved;
                    if (src.startsWith("/")) {
                        // Root-relative: strip leading slash
                        resolved = src.slice(1);
                    } else {
                        // Relative to the markdown file's directory
                        resolved = dir ? dir + "/" + src : src;
                        // Normalize . and .. segments
                        var parts = resolved.split("/");
                        var stack = [];
                        for (var i = 0; i < parts.length; i++) {
                            if (parts[i] === "." || parts[i] === "") continue;
                            if (parts[i] === ".." && stack.length > 0) {
                                stack.pop();
                            } else if (parts[i] !== "..") {
                                stack.push(parts[i]);
                            }
                        }
                        resolved = stack.join("/");
                    }
                    img.setAttribute("src", "/api/raw?path=" + encodeURIComponent(resolved));
                });
            }

            // Build index mapping basenames to full paths for wiki link resolution
            function buildWikiLinkIndex() {
                if (wikiLinkIndex && allFiles) return wikiLinkIndex;
                if (!allFiles) return null;

                wikiLinkIndex = {};
                allFiles.forEach(function(path) {
                    var basename = path.split('/').pop();
                    var nameNoExt = basename.replace(/\.md$/i, '');

                    // Index by name without extension
                    if (!wikiLinkIndex[nameNoExt.toLowerCase()]) {
                        wikiLinkIndex[nameNoExt.toLowerCase()] = [];
                    }
                    wikiLinkIndex[nameNoExt.toLowerCase()].push(path);

                    // Also index by full basename
                    if (!wikiLinkIndex[basename.toLowerCase()]) {
                        wikiLinkIndex[basename.toLowerCase()] = [];
                    }
                    wikiLinkIndex[basename.toLowerCase()].push(path);
                });
                return wikiLinkIndex;
            }

            // Resolve wiki link target to actual file path
            function resolveWikiTarget(target, currentDir) {
                var index = buildWikiLinkIndex();
                if (!index) return null;

                // Normalize target
                var normalizedTarget = target.trim();

                // Try exact path match first
                if (allFiles.indexOf(normalizedTarget) !== -1) {
                    return normalizedTarget;
                }
                // Try with .md extension
                if (allFiles.indexOf(normalizedTarget + '.md') !== -1) {
                    return normalizedTarget + '.md';
                }

                // Try basename lookup
                var basename = normalizedTarget.split('/').pop().toLowerCase();
                var candidates = index[basename] || index[basename.replace(/\.md$/i, '')] || [];

                if (candidates.length === 0) return null;
                if (candidates.length === 1) return candidates[0];

                // Multiple matches: prefer same directory
                var sameDirMatch = candidates.find(function(c) {
                    var dir = c.split('/').slice(0, -1).join('/');
                    return dir === currentDir;
                });
                if (sameDirMatch) return sameDirMatch;

                // Otherwise return shortest path
                candidates.sort(function(a, b) { return a.length - b.length; });
                return candidates[0];
            }

            // Resolve all wiki links in a container
            function resolveWikiLinks(container, currentFilePath) {
                var currentDir = currentFilePath.split('/').slice(0, -1).join('/');
                var links = container.querySelectorAll('a.wiki-link');

                if (links.length === 0) return;

                // Ensure file list is loaded for resolution
                if (!allFiles) {
                    apiFetch('/api/files').then(function(result) {
                        if (result.ok) {
                            allFiles = result.data;
                            wikiLinkIndex = null;
                            resolveWikiLinksInner(links, currentDir);
                        }
                    });
                } else {
                    resolveWikiLinksInner(links, currentDir);
                }
            }

            // Convert heading text to slug format (same as addHeadingAnchors)
            function slugifyHeading(text) {
                return text.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
            }

            function resolveWikiLinksInner(links, currentDir) {
                links.forEach(function(link) {
                    var target = link.dataset.wikiTarget;
                    var heading = link.dataset.wikiHeading || '';
                    var headingSlug = heading ? slugifyHeading(heading) : '';
                    var resolved = resolveWikiTarget(target, currentDir);

                    if (resolved) {
                        link.href = '/' + resolved + (headingSlug ? '#' + headingSlug : '');
                        link.classList.add('wiki-link-valid');
                        link.onclick = async function(e) {
                            e.preventDefault();
                            await loadFile(resolved);
                            if (headingSlug) {
                                // Update URL to include the hash
                                history.replaceState(null, '', location.pathname + '#' + headingSlug);
                                var h = document.getElementById(headingSlug);
                                if (h) h.scrollIntoView({ behavior: 'smooth' });
                            }
                        };
                    } else {
                        link.classList.add('wiki-link-broken');
                        link.title = 'File not found: ' + target;
                    }
                });
            }

            function bindAnchorLinks(container) {
                container
                    .querySelectorAll('a[href^="#"]:not(.wiki-link)')
                    .forEach(function (link) {
                        link.onclick = function (e) {
                            var id = link.getAttribute("href").slice(1);
                            var target = document.getElementById(id);
                            if (target) {
                                e.preventDefault();
                                target.scrollIntoView({ behavior: "smooth" });
                            }
                        };
                    });
            }

            function addHeadingAnchors(container) {
                var linkIcon =
                    '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="m7.775 3.275 1.25-1.25a3.5 3.5 0 1 1 4.95 4.95l-2.5 2.5a3.5 3.5 0 0 1-4.95 0 .751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018 1.998 1.998 0 0 0 2.83 0l2.5-2.5a2.002 2.002 0 0 0-2.83-2.83l-1.25 1.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042Zm-4.69 9.64a1.998 1.998 0 0 0 2.83 0l1.25-1.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042l-1.25 1.25a3.5 3.5 0 1 1-4.95-4.95l2.5-2.5a3.5 3.5 0 0 1 4.95 0 .751.751 0 0 1-.018 1.042.751.751 0 0 1-1.042.018 1.998 1.998 0 0 0-2.83 0l-2.5 2.5a1.998 1.998 0 0 0 0 2.83Z"/></svg>';
                container
                    .querySelectorAll("h1, h2, h3, h4, h5, h6")
                    .forEach(function (h) {
                        if (h.querySelector(".heading-anchor")) return; // Already has anchor
                        var id = h.id;
                        if (!id) {
                            id = slugifyHeading(h.textContent);
                            h.id = id;
                        }
                        var anchor = document.createElement("a");
                        anchor.className = "heading-anchor";
                        anchor.href = "#" + id;
                        anchor.innerHTML = linkIcon;
                        anchor.setAttribute("aria-hidden", "true");
                        anchor.onclick = function (e) {
                            e.preventDefault();
                            history.pushState(null, "", "#" + id);
                            h.scrollIntoView({ behavior: "smooth" });
                        };
                        h.appendChild(anchor);
                    });
