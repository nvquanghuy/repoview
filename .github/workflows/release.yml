name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pair in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${pair%/*}" GOARCH="${pair#*/}" \
              go build -ldflags "-X main.version=${VERSION}" -o repoview .
            tar czf "repoview-${pair%/*}-${pair#*/}.tar.gz" repoview
            rm repoview
          done
          for pair in windows/amd64 windows/arm64; do
            GOOS="${pair%/*}" GOARCH="${pair#*/}" \
              go build -ldflags "-X main.version=${VERSION}" -o repoview.exe .
            zip "repoview-${pair%/*}-${pair#*/}.zip" repoview.exe
            rm repoview.exe
          done

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract section between current version header and next version header (or EOF)
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[v[0-9]/{flag=0} flag" CHANGELOG.md | sed '/^$/N;/^\n$/d')
          # Handle multi-line output for GitHub Actions
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            repoview-*.tar.gz
            repoview-*.zip
            install.sh
            install.ps1
