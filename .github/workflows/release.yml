name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          for pair in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS="${pair%/*}" GOARCH="${pair#*/}" go build -o repoview .
            tar czf "repoview-${pair%/*}-${pair#*/}.tar.gz" repoview
            rm repoview
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            repoview-*.tar.gz
            install.sh
